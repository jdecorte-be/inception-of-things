apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-mgomes-d2
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://gitlab.com/mgomes-d/argocd-mgomes-d_bonus.git
    targetRevision: HEAD
    path: argocd-deploy
  destination:
    server: https://kubernetes.default.svc
    namespace: dev2
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
